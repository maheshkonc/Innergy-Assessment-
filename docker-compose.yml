services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: innergy
      POSTGRES_PASSWORD: innergy
      POSTGRES_DB: innergy
    ports:
      # Host 5433 → container 5432. Host 5432 already used by another
      # project's Postgres; remap to avoid the collision.
      - "5433:5432"
    volumes:
      - innergy_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      # Host 6380 → container 6379, same reasoning as Postgres above.
      - "6380:6379"
    volumes:
      - innergy_redis_data:/data

volumes:
  innergy_pg_data:
  innergy_redis_data:
